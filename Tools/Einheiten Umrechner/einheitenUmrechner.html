<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Einheiten Umrechner</title>
    <link rel="stylesheet" href="/MathVerse-app/css/feedback.css">
    <link rel="stylesheet" href="../allgemein.css">
    <link rel="stylesheet" href="./einheitenUmrechner.css">
</head>
<body>
    <header>
        <nav class="navbar">
        <a href="/MathVerse-app-main/3. MathematischeFunktionen/index.html"><img src="/MathVerse-app/pictures/WebsiteLogoImageLongImageV2.png" alt="" class="navImage"></a>

        <div><input type="text" name="search" id="searchInput" placeholder="Suche..."></div>

        <div>
            <a href="" target="_self" class="navTextBorder">Login</a>
            <a href="" target="_self" class="navTextBorder">Register</a>
        </div>
    </nav>
    </header>
    <main>



        <section class="einheitenBody">
            <h1 class="zahlenHeader">Einheiten Umrechner</h1>

            <div class="einheitenGruppenContainer">
                <button data-category="btnLength" class="btnUnits">Length</button> <button data-category="btnMass" class="btnUnits">Mass</button>   <button data-category="btnTime" class="btnUnits">Time</button>
            </div>

            <div class="advancedMode">
                <span class="advancedText">Advanced Mode</span>
                <!-- Rounded switch -->
                <label class="switch"><input type="checkbox"><span class="slider round"></span></label>
            </div>

            <div class="einheitsDiv">
                <input type="text" id="inputEinheit" placeholder="Zahl eingeben..." class="zahlenInputfeld">

                <select name="inputA" id="einheitA" class="selection">
                    <option value=""> ...</option>
                </select>

                <i class="fas fa-long-arrow-alt-down"></i>

                <select name="inputZ" id="einheitZ" class="selection">
                    <option value=""> ...</option>
                </select>

                <div class="loesungsDiv"><p id="loesungOutput">Ergebnis</p></div>
            </div>
            
            <p id="errorMessages" class="falscheEingabestyle"></p>

            <div class="zahlenAusgabestyle" id="ausgabeContainer">
                <div class="rechenwegDiv">
                    <p class="rechenwegText">Rechenweg:</p> 
                    <div id="rechenwegOutput"></div>
                </div>
            </div>
        </section>




    </main>
    <footer>
        <div class="footerNav">

            <div class="platzhalter">Platzhalter</div>

            <div class="linksFooterect">
                <a href="">Datenschutz</a>

                <button id="openFeedbackBtn">Feedback senden</button>

                <a href="">Impressum</a>
            </div>
        </div>
    </footer>
        <div id="feedbackModal" class="modal">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                
                <div id="feedbackFormContainer">
                <h2 class="feedback-header">Feedback senden</h2>
                <form id="feedbackForm">
                    <label for="feedbackCategory" class="feedback-label">Kategorie</label>
                    <select id="feedbackCategory" class="feedback-select" required>
                    <option value="" disabled selected hidden>Wähle eine Kategorie...</option>
                    <option value="Design">Design / UI</option>
                    <option value="Tool fehlt">Neues Mathe-Tool vorschlagen</option>
                    <option value="Bug">Fehler / Bug melden</option>
                    <option value="Sonstiges">Sonstiges</option>
                    </select>

                    <label for="feedbackText" class="feedback-label">Deine Nachricht</label>
                    <textarea id="feedbackText" class="feedback-textarea" rows="4" required placeholder="Schreibe hier dein Feedback..."></textarea>
                    
                    <button type="submit" class="feedback-submit-btn">Absenden</button>
                </form>
                </div>

                <div id="successMessage" class="success-container" style="display: none;">
                <div class="success-icon">&#10004;</div>
                <h3 class="success-header">Übertragen!</h3>
                <p class="success-text">Vielen Dank, dein Feedback hilft uns die Mathe-Tools noch besser zu machen.</p>
                </div>

            </div>
        </div>
    <script src="./einheitenUmrechner.js"></script>
    <script src="/MathVerse-app/javaScript/feedback.js"></script>
</body>
</html>
