<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dezimal ↔ Bruch Umrechner</title>
    <link rel="icon" type="image/x-icon" href="../../pictures/favicon v1.png">
    <link rel="stylesheet" href="../../css/feedback.css">
    <link rel="stylesheet" href="../../css/Common/common.css">
    <link rel="stylesheet" href="./dezBruchConverter.css">
</head>
<body>
    <header>
        <nav class="navbar">
        <a href="../../index.html"><img src="../../pictures/WebsiteLogoImageLongImageV2.png" alt="" class="navImage"></a>

        <div>
            <input type="text" name="search" id="searchInput" placeholder="Suche..." autocomplete="off">

            <div id="searchResults"></div>
        </div>

        <div id="navUserArea"><a href="../../html/login.html" target="_self" class="navTextBorder">Login</a>
            <a href="../../html/register.html" target="_self" class="navTextBorder">Register</a>
        </div>
    </nav>
    </header>
    <main>

        <section class="dezBruchSection">
            <h1 class="zahlenHeader">Dezimal ↔ Bruch Umrechner</h1>

            <div class="cardsContainer">
                <div class="cards">
                    <h3>Eingabe</h3>
                    <div id="cardDezimalContainer">
                        <div class="card">
                            <h2>Dezimal</h2>

                            <input type="number" id="inputFeld3" placeholder="z.B. 0.75" class="zahlenInputfeld">
                        </div>
                    </div>
                </div>

                <button class="swapBtn" id="swapBtn" type="button" aria-label="Eingabe und Ausgabe tauschen">
                    <i class="fa fa-exchange"></i>
                </button>

                <div class="cards">
                    <h3>Ausgabe</h3>
                    <div id="cardBruchContainer">
                        <div class="card">
                            <h2>Bruch</h2>

                            <div class="bruchEingabe">
                                <input type="number" id="zaehler1" placeholder="Zähler" class="zahlenInputfeld">
                                <div class="bruchStrich"></div>
                                <input type="number" id="nenner1"  placeholder="Nenner" class="zahlenInputfeld">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <p class="falscheEingabestyle" id="errorMessages"></p>

            <div class="zahlenAusgabestyle" id="ausgabeContainer">
                <div class="rechenwegDiv">
                    <p class="rechenwegText">Rechenweg:</p>
                    <div id="rechenwegOutput"></div>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <div class="footerNav">

            <div class="footerSocial">
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-twitter"></i></a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-instagram"></i></a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-youtube-play"></i></a>
                <a href="https://github.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-github"></i></a>
            </div>

            <div class="linksFooterect">
                <a href="../../html/datenSchutz.html">Datenschutz</a>

                <button id="openFeedbackBtn">Feedback senden</button>

                <a href="../../html/impressum.html">Impressum</a>
            </div>

            <div class="platzhalter">&copy; 2026 MathVerse</div>
        </div>
    </footer>
    <script src="../../javaScript/Common/common-login.js"></script>
    <script src="./dezBruchConverter.js"></script>
    <script src="../../javaScript/feedback.js"></script>
    <script type="module" src="../../javaScript/toolFavorite.js"></script>
    <script type="module" src="../../javaScript/search.js"></script>
</body>
</html>
