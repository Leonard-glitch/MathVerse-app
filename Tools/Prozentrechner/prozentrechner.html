<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prozentrechnung</title>
    <link rel="stylesheet" href="../../css/feedback.css">
    <link rel="stylesheet" href="../allgemein.css">
    <link rel="stylesheet" href="./prozentrechner.css">
</head>
<body>
    <header>
        <nav class="navbar">
        <a href="../../index.html"><img src="../../pictures/WebsiteLogoImageLongImageV2.png" alt="" class="navImage"></a>

        <div>
            <input type="text" name="search" id="searchInput" placeholder="Suche..." autocomplete="off">

            <div id="searchResults"></div>
        </div>

        <div id="navUserArea"><a href="../../html/login.html" target="_self" class="navTextBorder">Login</a>
            <a href="../../html/register.html" target="_self" class="navTextBorder">Register</a>
        </div>
    </nav>
    </header>
    <main>



        <section class="prozentrechnungSection">

            <h1 class="zahlenHeader">Prozentrechnung</h1>

            <div class="tool" data-type="share-of">
                <fieldset class="formula">
                    <legend>Anteil</legend>
                    <input data-role="p" class="zahlenInputfeld" placeholder="20">
                    <span class="textSpan">% von</span>
                    <input data-role="G" class="zahlenInputfeld" placeholder="150">
                    <span class="textSpan">= ?</span>

                        <div class="formulaErgebnis">
                            <p class="ergebnisText"></p>
                        </div>
                </fieldset>

                <button type="button" class="buttonPercent">Berechnen</button>
            </div>

            <div class="tool" data-type="percent-of">
                <fieldset class="formula">
                    <legend>Prozentsatz</legend>
                    <input data-role="A" class="zahlenInputfeld" placeholder="30">
                    <span class="textSpan">von</span>
                    <input data-role="G" class="zahlenInputfeld" placeholder="200">
                    <span class="textSpan">sind wie viel % ?</span>

                        <div class="formulaErgebnis">
                            <p class="ergebnisText"></p>
                        </div>
                </fieldset>

                <button type="button" class="buttonPercent">Berechnen</button>
            </div>


            <div class="tool" data-type="basis-value-of">
                <fieldset class="formula">
                    <legend>Grundwert</legend>
                    <input data-role="A" class="zahlenInputfeld" placeholder="50">
                    <span class="textSpan">sind</span>
                    <input data-role="p" class="zahlenInputfeld" placeholder="25">
                    <span class="textSpan">% von ?</span>

                        <div class="formulaErgebnis">
                            <p class="ergebnisText"></p>
                        </div>
                </fieldset>

                <button type="button" class="buttonPercent">Berechnen</button>
            </div>





            
            
            <p class="falscheEingabestyle" id="errorMessages">Falsche Eingabe</p>

            <div class="zahlenAusgabestyle">
                <div class="rechenwegDiv">
                    <p class="rechenwegText">Rechenweg:</p> <div id="rechenwegOutput"></div>
                </div>
                <p id="tipp"></p>
            </div>
        </section>




    </main>
    <footer>
        <div class="footerNav">

            <div class="footerSocial">
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-twitter"></i></a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-instagram"></i></a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-youtube-play"></i></a>
                <a href="https://github.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-github"></i></a>
            </div>

            <div class="linksFooterect">
                <a href="../../html/datenSchutz.html">Datenschutz</a>

                <button id="openFeedbackBtn">Feedback senden</button>

                <a href="../../html/impressum.html">Impressum</a>
            </div>

            <div class="platzhalter">&copy; 2026 MathVerse</div>
        </div>
    </footer>
    <script src="../../javaScript/Allgemeines/allgemein-login.js"></script>
    <script src="./prozentrechner.js"></script>
    <script src="../../javaScript/feedback.js"></script>
    <script src="../../javaScript/toolFavorite.js"></script>
    <script type="module" src="../../javaScript/search.js"></script>
</body>
</html>
