<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/register.css">
    <title>Register</title>
</head>
<body>
    <section>
        <h1 class="headerOne">Register</h1>
        <div class="loginDiv">
            <form action="">
                <div class="lintDiv">
                    <label for="userName">User Name</label>
                    <input type="userName" id="userName" name="userName" required>
                </div>
                <div class="lintDiv">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="lintDiv">
                    <label for="passwordConf">Confirm Password</label>
                    <input type="password" id="passwordConf" name="passwordConf" required>
                </div>
                <p id="messages"></p>
                <div class="button"><button type="submit">Register</button></div>
            </form>
            <div class="infosDiv">
                <p class="infosText">Already have an Accound? <a href="./login.html" class="infosLInk">Login</a></p>
            </div>
        </div>
    </section>
</body>
</html>
