<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Tools/allgemein.css">
    <link rel="stylesheet" href="../css/login.css">
    <title>Login</title>
</head>
<body>
    <main>
        <section>
            <div class="loginContainer">
                <h1 class="loginTitle">Login</h1>

                <form action="/login" method="POST" class="loginForm" novalidate>
                    
                    <div class="inputGroup">
                        <input type="text" id="username" name="username" class="xInput" placeholder=" " required>
                        <label for="username" class="floatingLabel">Benutzername oder E-Mail</label>
                        <small class="input-hint">Du kannst dich wahlweise mit deinem Benutzernamen oder deiner E-Mail-Adresse anmelden.</small>
                    </div>
                    <div id="usernameError" class="falscheEingabestyle field-error" style="display: none;"></div>

                    <div class="inputGroup">
                        <input type="password" id="password" name="password" class="xInput" placeholder=" " required>
                        <label for="password" class="floatingLabel">Passwort</label>
                        
                        <div class="forgotPasswordWrapper">
                            <a href="./forgot-password.html" class="forgotPasswordLink">Passwort vergessen?</a>
                        </div>
                    </div>
                    <div id="formError" class="falscheEingabestyle field-error" style="display: none;"></div>

                    <button type="submit" class="xLoginBtn">Anmelden</button>
                </form>

                <div class="signupPrompt">
                    Du hast noch kein Konto? <a href="./register.html" class="signupLink">Registrieren</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footerNav">
            <div class="footerSocial">
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-twitter"></i></a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-instagram"></i></a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-youtube-play"></i></a>
                <a href="https://github.com" target="_blank" rel="noopener noreferrer"><i class="fa fa-github"></i></a>
            </div>

            <div class="linksFooterect">
                <a href="./datenSchutz.html">Datenschutz</a>
                <button id="openFeedbackBtn">Feedback senden</button>
                <a href="./impressum.html">Impressum</a>
            </div>
            
            <div class="platzhalter">&copy; MathVerse</div>
        </div>
    </footer>
    <script src="../javaScript/login.js"></script>
</body>
</html>
