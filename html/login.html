<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <title>Login</title>
</head>
<body>
    <section>
        <h1 class="headerOne">Login</h1>
        <div class="loginDiv">
            <form action="">
                <div class="lintDiv">
                    <label for="userName">User Name</label>
                    <input type="userName" id="userName" name="userName" required>
                </div>
                <div class="lintDiv">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <p id="messages"></p>
                <div class="button"><button type="submit">Login</button></div>
            </form>
            <div class="infosDiv">
                <p class="infosText">Don't have a Account yet? <a href="./register.html" class="infosLInk">Register</a></p>
                <p><a href="" class="infosLInk">Forgot Password?</a></p>
            </div>
        </div>
    </section>
</body>
</html>
