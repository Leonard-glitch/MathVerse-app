<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Prozentrechnung</title>
    <link rel="stylesheet" href="../allgemein.css">
    <link rel="stylesheet" href="./prozentrechnung.css">
</head>
<body>
    <header>
        <nav class="navbar">
        <a href="/MathVerse-app-main/3. MathematischeFunktionen/index.html"><img src="/3. MathematischeFunktionen/pictures/WebsiteLogoImageLongImageV2.png" alt="" class="navImage"></a>

        <div><input type="text" name="search" id="searchInput" placeholder="Suche..."></div>

        <div>
            <a href="" target="_self" class="navTextBorder">Login</a>
            <a href="" target="_self" class="navTextBorder">Register</a>
        </div>
    </nav>
    </header>
    <main>



        <section class="prozentrechnungSection">

            <h1 class="zahlenHeader">Prozentrechnung</h1>

            <div class="zeilenFormula">
                <fieldset class="formula">
                    <legend>Anteil</legend>
                    <input id="f1Wert1" class="zahlenInputfeld" placeholder="20">
                    <span class="textSpan">% von</span>
                    <input id="f1Wert2" class="zahlenInputfeld" placeholder="150">
                    <span class="textSpan">= ?</span>

                        <div class="formulaErgebnis" id="f1FormulaErgebnis">
                            <span id="f1OutputText"></span>
                            <span id="f1ErgebnisOutput"></span>
                        </div>
                </fieldset>

                <button type="button" id="f1Button">Berechnen</button>
            </div>

            <div class="zeilenFormula">
                <fieldset class="formula">
                    <legend>Prozentsatz</legend>
                    <input id="f2Wert1" class="zahlenInputfeld" placeholder="30">
                    <span class="textSpan">von</span>
                    <input id="f2Wert2" class="zahlenInputfeld" placeholder="200">
                    <span class="textSpan">sind wie viel % ?</span>

                        <div class="formulaErgebnis" id="f2FormulaErgebnis">
                            <span id="f2OutputText"></span>
                            <span id="f2ErgebnisOutput"></span>
                        </div>
                </fieldset>

                <button type="button" id="f2Button">Berechnen</button>
            </div>


            <div class="zeilenFormula">
                <fieldset class="formula">
                    <legend>Grundwert</legend>
                    <input id="f3Wert1" class="zahlenInputfeld" placeholder="50">
                    <span class="textSpan">sind</span>
                    <input id="f3Wert2" class="zahlenInputfeld" placeholder="25">
                    <span class="textSpan">% von ?</span>

                        <div class="formulaErgebnis" id="f3FormulaErgebnis">
                            <span id="f3OutputText"></span>
                            <span id="f3ErgebnisOutput"></span>
                        </div>
                </fieldset>

                <button type="button" id="f3Button">Berechnen</button>
            </div>





            
            
            <p class="falscheEingabestyle" id="errorMessages">Falsche Eingabe</p>

            <div class="zahlenAusgabestyle">
                <div class="rechenwegDiv">
                    <p class="rechenwegText">Rechenweg:</p> <div id="rechenwegOutput"></div>
                </div>
                <p id="tipp"></p>
            </div>
        </section>




    </main>
    <footer>
        <div class="footerNav">

            <div class="platzhalter">Platzhalter</div>

            <div class="linksFooterect">
                <a href="">Datenschutz</a>

                <a href="">Feedback</a>

                <a href="">Impressum</a>
            </div>
        </div>
    </footer>
    <script src="./prozentrechnung.js"></script>
</body>
</html>
